services:
  oracle-db:
    image: container-registry.oracle.com/database/free:latest
    container_name: oracle-aidev-db
    ports:
      - "${ORACLE_PORT:-1521}:1521"
      - "${ORACLE_EM_PORT:-5500}:5500"
    environment:
      - ORACLE_PWD=${ORACLE_PWD:-FreeP4ssw0rd!}
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./scripts/init-schema.sql:/opt/oracle/scripts/startup/init-schema.sql:ro
    healthcheck:
      test: ["CMD", "sh", "-c", "echo 'SELECT 1 FROM DUAL;' | sqlplus -s system/$${ORACLE_PWD}@FREEPDB1"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 120s
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: oracle-aidev-app
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      - ORACLE_HOST=oracle-db
      - ORACLE_PORT=1521
      - ORACLE_SERVICE=FREEPDB1
      - ORACLE_USER=${ORACLE_USER:-system}
      - ORACLE_PWD=${ORACLE_PWD:-FreeP4ssw0rd!}
    env_file:
      - path: .env
        required: false
    depends_on:
      oracle-db:
        condition: service_healthy
    restart: unless-stopped

  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: oracle-aidev-dev
    ports:
      - "${DEV_PORT:-8001}:8000"
    environment:
      - ORACLE_HOST=oracle-db
      - ORACLE_PORT=1521
      - ORACLE_SERVICE=FREEPDB1
      - ORACLE_USER=${ORACLE_USER:-system}
      - ORACLE_PWD=${ORACLE_PWD:-FreeP4ssw0rd!}
    env_file:
      - path: .env
        required: false
    depends_on:
      oracle-db:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./tests:/app/tests
    restart: unless-stopped

volumes:
  oracle-data:
